version: "3"

services:
  next:
    build:
      context: ..
      dockerfile: .devcontainer/dev.Dockerfile
    depends_on:
      - db
    ports:
      - 3000:3000
    volumes:
      - ..:/namu:cached
      - ${SSH_KEY_PATH:-~/.ssh/id_ed25519}:/root/.ssh/id_ed25519
    env_file:
      - ../.env
    command: /bin/sh -c "chmod 600 /root/.ssh/id_ed25519 && while sleep 1000; do :; done"

  db:
    image: postgres:14
    restart: always
    tty: true
    volumes:
      - db-data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=dev-user
      - POSTGRES_DB=dev-namu
      - POSTGRES_PASSWORD=dev-password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432

volumes:
  db-data:
